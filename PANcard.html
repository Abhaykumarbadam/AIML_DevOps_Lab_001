<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>PAN Card</title>

<style>
body {
  background:#f2f2f2;
  font-family: Arial, Helvetica, sans-serif;
  display:flex;
  gap:40px;
  justify-content:center;
  align-items:center;
  min-height:100vh;
}

/* CARD BASE */
.card {
  width:340px;
  height:215px;
  border-radius:10px;
  background:linear-gradient(135deg,#b9d8ff,#f4e6ff);
  box-shadow:0 8px 25px rgba(0,0,0,.2);
  padding:12px;
  box-sizing:border-box;
  position:relative;
}

/* HEADER */
.header {
  display:flex;
  justify-content:space-between;
  font-size:12px;
  font-weight:bold;
}

/* CONTENT */
.content {
  display:flex;
  margin-top:10px;
  gap:10px;
}

.left {
  flex:1;
  font-size:12px;
}

.label {
  font-size:10px;
  opacity:.8;
}

.value {
  font-weight:bold;
  margin-bottom:6px;
}

/* QR PLACEHOLDER */
.qr {
  width:60px;
  height:60px;
  background:
    repeating-linear-gradient(
      45deg,
      #000,
      #000 2px,
      #fff 2px,
      #fff 4px
    );
  border-radius:4px;
  margin-bottom:6px;
}

/* PHOTO */
.photo {
  width:75px;
  height:90px;
  border-radius:4px;
  border:2px solid #444;
  object-fit:cover;
}

/* FOOTER */
.footer {
  position:absolute;
  bottom:10px;
  left:12px;
  right:12px;
  display:flex;
  justify-content:space-between;
  font-size:10px;
}

.signature {
  font-style:italic;
  font-size:12px;
}

/* BACK CARD */
.back-text {
  font-size:11px;
  line-height:1.4;
  margin-top:30px;
}
</style>
</head>

<body>

<!-- FRONT -->
<div class="card">
  <div class="header">
    <span>INCOME TAX DEPT.<br/>Govt. of Sample</span>
    <span>PERMANENT ACCOUNT CARD</span>
  </div>

  <div class="content">
    <div class="left">
      <div class="label">Name</div>
      <div class="value">SAMPLE PERSON</div>

      <div class="label">Father's Name</div>
      <div class="value">SAMPLE PARENT</div>

      <div class="label">Date of Birth</div>
      <div class="value">01/01/1995</div>

      <div class="label">ID Number</div>
      <div class="value">ABCDE1234F</div>
    </div>

    <div>
      <div class="qr"></div>

      <img
        class="photo"
        src="download.jpeg"
        alt="ID Photo"
      />
    </div>
  </div>

  <div class="footer">
    <div class="signature">Signature</div>
  </div>
</div>

<!-- BACK -->
<div class="card">
  <div class="back-text">
    <strong>IMPORTANT</strong><br/><br/>
    In case this card is lost or found, kindly return it to:<br/><br/>
    Sample ID Services Unit<br/>
    Plot No. 1, Sector 1<br/>
    Sample City – 000000<br/><br/>
  </div>
</div>

</body>
</html>
